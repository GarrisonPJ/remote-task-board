name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  typecheck-build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: remote_task_board_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/remote_task_board_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Playwright browsers must be installed before build
      # (test imports may reference Playwright types)
      - run: pnpm playwright install --with-deps

      - run: pnpm prisma migrate deploy

      - run: pnpm db:seed

      - run: pnpm typecheck

      - run: pnpm build

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

      - name: Run E2E tests
        run: pnpm test:e2e
